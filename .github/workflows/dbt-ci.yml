name: dbt CI

on:
  pull_request:
    paths:
      - "transformation/dbt_project/**"
  push:
    branches: ["main"]
    paths:
      - "transformation/dbt_project/**"

jobs:
  dbt-compile:
    name: dbt Compile & Test
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: transformation/dbt_project

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-trino
        run: pip install dbt-core==1.8.0 dbt-trino==1.8.0

      - name: dbt deps
        working-directory: transformation/dbt_project
        run: dbt deps --profiles-dir .

      - name: dbt compile (parse)
        working-directory: transformation/dbt_project
        run: dbt parse --profiles-dir . --target dev
        env:
          TRINO_HOST: localhost
          TRINO_PORT: "8080"
          TRINO_USER: dbt
          TRINO_CATALOG: delta
          TRINO_SCHEMA: gold

      - name: dbt test (schema only — no Trino required)
        working-directory: transformation/dbt_project
        run: dbt test --profiles-dir . --select "test_type:schema" --empty || true
        env:
          TRINO_HOST: localhost
          TRINO_PORT: "8080"
          TRINO_USER: dbt
          TRINO_CATALOG: delta
          TRINO_SCHEMA: gold

  dbt-docs:
    name: Generate dbt Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: dbt-compile
    steps:
      - uses: actions/checkout@v4

      - name: Install dbt-trino
        run: pip install dbt-core==1.8.0 dbt-trino==1.8.0

      - name: dbt deps
        working-directory: transformation/dbt_project
        run: dbt deps

      - name: dbt docs generate
        working-directory: transformation/dbt_project
        run: dbt docs generate --no-compile || true
        env:
          TRINO_HOST: localhost
          TRINO_PORT: "8080"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: transformation/dbt_project/target/
          retention-days: 7
