source:
  type: dbt
  config:
    manifest_path: "/opt/dbt/target/manifest.json"
    catalog_path: "/opt/dbt/target/catalog.json"
    run_results_path: "/opt/dbt/target/run_results.json"
    target_platform: trino
    node_name_pattern:
      allow:
        - ".*"
    meta_mapping:
      owner:
        match: "owner"
        operation: "add_owner"
        config:
          owner_type: user
    enable_meta_mapping: true
    disable_dbt_node_creation: false
    load_schemas: true
    use_identifiers: true

sink:
  type: datahub-rest
  config:
    server: "http://datahub-gms:8080"

pipeline_name: "melisimlake_dbt"
