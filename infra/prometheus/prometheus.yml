---
# =============================================================================
# Prometheus — configuração de scraping
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: melisimlake

rule_files:
  - "rules/*.yml"

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ml-api
    static_configs:
      - targets: ["ml-api:8000"]
    metrics_path: /metrics

  - job_name: airflow
    static_configs:
      - targets: ["airflow-webserver:8080"]
    metrics_path: /metrics

  - job_name: spark-master
    static_configs:
      - targets: ["spark-master:8080"]
    metrics_path: /metrics

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ["minio:9000"]
